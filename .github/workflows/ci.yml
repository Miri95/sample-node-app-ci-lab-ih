name: Build, Test, and Deploy to Azure Container Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies and run tests
        run: |
          npm install
          # npm test  # Uncomment this if you have tests defined in package.json

      - name: Azure Login
        uses: azure/login@v2
        with:
          # This JSON format bypasses the OIDC error and uses your Service Principal Secret
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Build and deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          # Registry Details
          registryUrl: docker.io
          registryUsername: ${{ secrets.DOCKERHUB_USERNAME }}
          registryPassword: ${{ secrets.DOCKERHUB_TOKEN }}
          
          # Azure Details (Matches the new Resource Group you created)
          resourceGroup: container-labs-miri-rg
          containerAppName: frontendapp
          
          # Image Configuration
          imageToBuild: ${{ secrets.DOCKERHUB_USERNAME }}/frontendapp-node:${{ github.sha }}
          dockerfilePath: Dockerfile